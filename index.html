<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FDE/SDE 2026 — Interview Prep</title>

<!-- Critical layout CSS — inlined to eliminate FOUC during Tailwind CDN
     compilation. Applied during HTML parse, before any external CSS/JS.
     Targets elements by #ID so nothing else can de-position the sidebar
     while the rest of the styles load. -->
<style id="critical">
  html, body { margin: 0; background: #F8F9FC; color: #0F172A;
    font: 14.5px/1.55 'Geist', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
  #app { display: flex; min-height: 100vh; min-height: 100dvh; }
  #sidebar {
    display: flex; flex-direction: column;
    width: 224px; flex-shrink: 0;
    position: sticky; top: 0;
    height: 100vh; height: 100dvh;
    background: rgba(252, 253, 255, 0.78);
    border-right: 1px solid rgba(15,23,42,0.08);
    padding: 1.25rem; gap: 4px;
    z-index: 40;
  }
  #sidebar-backdrop { display: none; }
  main { flex: 1 1 0; min-width: 0; width: 100%; display: flex; flex-direction: column; }
  @media (max-width: 899px) {
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 240px; max-width: 86vw;
      transform: translateX(-100%);
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 28px 0 60px -20px rgba(15,23,42,0.18);
    }
    body.sidebar-open #sidebar { transform: translateX(0); }
    body.sidebar-open #sidebar-backdrop {
      display: block;
      position: fixed; inset: 0; z-index: 30;
      background: rgba(15,23,42,0.18);
    }
  }
  /* Hide until critical CSS + Tailwind hydrate, to avoid a 1-frame flash */
  html:not(.ready) body { visibility: hidden; }
</style>

<script>
  // Reveal the page once the inlined critical CSS is in effect.
  // Two rAFs guarantee the inline <style> above has been applied.
  // Safety: also force-reveal after 800ms in case any later script errors.
  (function () {
    var html = document.documentElement;
    function reveal() { html.classList.add('ready'); }
    requestAnimationFrame(function () { requestAnimationFrame(reveal); });
    setTimeout(reveal, 800);
  })();
</script>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        // Sidebar docks earlier — at 900px instead of the default 1024px.
        // This avoids the "sidebar mysteriously gone" state when a browser
        // window is split or a smaller laptop is in use.
        screens: { lg: '900px' },
        colors: {
          // Light-mode palette: "ink" is now used as surface tints, not dark backgrounds.
          // Existing legacy class usage (bg-ink-900, border-ink-600, etc.) maps to
          // near-white surfaces and subtle hairlines.
          ink:    { 950:'#F1F3F8', 900:'#F4F5F9', 800:'#F7F8FB', 700:'#FFFFFF', 600:'rgba(15,23,42,0.10)' },
          accent: { 400:'#0EA371', 500:'#0B8A60', 600:'#0A7553' },
          warm:   { 400:'#C7780E', 500:'#A86409' },
          rose:   { 400:'#D7384C', 500:'#B22B3D' },
          violet: { 400:'#7849E0', 500:'#6336C7' },
          sky:    { 400:'#2E6FE0', 500:'#1F5BC1' },
        }
      }
    }
  }
</script>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- 2026 SOTA tech-platform typography (research-driven):
     Pattern observed across Linear (Söhne), Vercel (Geist), Notion (Inter), Stripe (Söhne).
     Common signal: neo-grotesque sans for UI + body, NOT mixed-serif. Editorial serifs
     are reserved for hero moments / pull quotes only.
     - Geist Sans (variable, Vercel/Basement Studio, Apache 2.0) — the open-source equivalent
       to Söhne; neo-grotesque, calm, intentional. Body + UI + most headings.
     - Geist Mono (variable) — code blocks, monospace UI.
     - Fraunces (variable, opsz + SOFT) — RESERVED for hero h1 and italic editorial pull only.
     - Inter is loaded as a fallback in case Geist fails to load. -->
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..700,0..100;1,9..144,400..700,0..100&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.3/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<!-- Three.js — real WebGL 3D for the tamagotchi room (r148 UMD = global THREE).
     ~600KB; loaded once, cached. Used by mountPet3D() in views.js. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.148.0/three.min.js"></script>
<!-- Prism.js — syntax highlighting for <pre><code> blocks across all lessons.
     Theme: prism-tomorrow (light surfaces look great in our liquid-glass design
     once we override .token colors in styles.css). Core + python + sql +
     javascript + bash covers ~98% of snippets in the curriculum. -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" data-manual></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="app" class="flex min-h-screen">

  <!-- Sidebar (lg+: docked sticky; mobile: slide-over via .sidebar-nav rules) -->
  <aside id="sidebar" class="sidebar-nav flex-col w-60 lg:w-56 shrink-0 border-r border-[color:var(--border)] sticky top-0 h-screen p-5 gap-1 z-40 bg-[color:var(--bg)]">
    <div class="flex items-center justify-between px-1 mb-5">
      <div>
        <div class="font-semibold text-[15px] tracking-tight">FDE/SDE 2026</div>
        <div class="text-[11px] muted mt-0.5">Interview prep</div>
      </div>
      <button id="sidebar-close" class="lg:hidden p-1 muted hover:text-white" aria-label="Close menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 6l12 12M6 18L18 6"/></svg>
      </button>
    </div>
    <nav id="sidenav" class="flex-1 flex flex-col gap-0.5 overflow-y-auto"></nav>
    <div id="sidebar-footer" class="border-t border-[color:var(--border)] pt-3 mt-3 text-[11px] muted"></div>
  </aside>
  <div id="sidebar-backdrop" class="fixed inset-0 bg-black/60 z-30 lg:hidden" style="display:none"></div>

  <!-- Main column -->
  <main class="flex-1 flex flex-col min-w-0 w-full">
    <header class="sticky top-0 z-20 bg-[color:var(--bg)] border-b border-[color:var(--border)]">
      <div class="px-3 sm:px-6 lg:px-8 py-3 flex items-center gap-2 sm:gap-3">
        <button id="mobile-menu" class="lg:hidden p-2 -ml-1" aria-label="Open menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div id="route-title" class="font-medium text-[14.5px] truncate min-w-0"></div>
        <div class="ml-auto flex items-center gap-3 sm:gap-5 text-[12px] sm:text-[12.5px] muted shrink-0">
          <span title="Streak" class="hidden xs:inline"><span id="streak-count" class="text-[color:var(--text)] font-mono tabular-nums">0</span>d</span>
          <span title="Level">Lvl <span id="level" class="text-[color:var(--text)] font-mono tabular-nums">1</span></span>
          <span title="Today XP" class="hidden md:inline"><span id="xp-text" class="font-mono">0/100</span></span>
          <button id="open-profile" class="w-7 h-7 rounded-full border border-[color:var(--border-2)] grid place-items-center text-[11px] font-medium hover:border-[color:var(--text)] transition shrink-0" title="Profile"><span id="profile-initial">?</span></button>
        </div>
      </div>
      <div class="h-px bg-[color:var(--border)] relative">
        <div id="daily-bar" class="absolute left-0 top-0 h-px bg-[color:var(--accent)] transition-all duration-500" style="width:0%"></div>
        <div id="xp-bar" style="display:none"></div>
      </div>
    </header>

    <section id="view" class="flex-1 px-3 sm:px-6 lg:px-8 py-5 sm:py-7 max-w-6xl w-full mx-auto"></section>

    <!-- Mobile Liquid Glass tab bar — floating, capsule, inset from edges.
         Visible only on mobile (< lg). JS populates the items and animates
         the active-pill indicator between them. -->
    <nav id="liquid-tabbar" class="lg:hidden" aria-label="Primary"></nav>
    <footer class="px-4 sm:px-6 lg:px-8 py-5 text-[11px] muted">
      <div class="flex items-center gap-4 flex-wrap">
        <span>Progress saves locally.</span>
        <a class="hover:text-[color:var(--text)] underline-offset-2 hover:underline" href="#infographics">Infographics</a>
        <a class="hover:text-[color:var(--text)] underline-offset-2 hover:underline" href="#sources">Sources &amp; methodology</a>
        <a class="hover:text-[color:var(--text)] underline-offset-2 hover:underline" href="#profile">Profile</a>
        <span class="ml-auto dim hidden sm:inline">Press <kbd class="px-1.5 py-0.5 rounded border border-[color:var(--border-2)] font-mono text-[10px]">?</kbd> for shortcuts</span>
      </div>
    </footer>
  </main>
</div>

<!-- Focus session timer (Pomodoro-ish) -->
<div id="focus-bar" class="hidden fixed bottom-3 right-3 sm:bottom-4 sm:right-4 z-40 card elevated max-w-[calc(100vw-1.5rem)]" style="padding: 0.5rem 0.8rem;">
  <div class="flex items-center gap-2 sm:gap-3 text-sm">
    <span id="focus-state" class="text-[10px] sm:text-xs uppercase tracking-wider muted">Focus</span>
    <span id="focus-clock" class="font-mono numeric" style="color:var(--accent)">50:00</span>
    <button id="focus-pause" class="btn !py-1 !px-2">Pause</button>
    <button id="focus-stop" class="btn btn-ghost !py-1 !px-2">Stop</button>
  </div>
</div>

<div id="toasts" class="fixed top-16 right-3 sm:right-4 z-50 flex flex-col gap-2 pointer-events-none max-w-[calc(100vw-1.5rem)]"></div>

<script src="js/data.js"></script>
<script src="js/quotes.js"></script>
<script src="js/gamification.js"></script>
<script src="js/animations.js"></script>
<script src="js/infographics.js"></script>
<script src="js/games.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>
<!-- Liquid Glass: adaptive substrate tinting. Loads after app so cards
     are already in the DOM. Cards published after dashboard render are
     picked up by the module's MutationObserver. -->
<script src="js/glass-adaptive.js"></script>

</body>
</html>
